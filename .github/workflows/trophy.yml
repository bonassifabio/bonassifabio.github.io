name: Generate Trophy

on:
  push:
    branches:
      - stats
  schedule:
    - cron: '0 0 */7 * *'
  workflow_dispatch:

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stats branch
        uses: actions/checkout@v4
        with:
          ref: stats

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: bonassifabio
          output_path: trophy.svg
          token: ${{ secrets.GTHB_TOKEN }}

      - name: Commit and push trophy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git diff --cached --quiet || git commit -m "chore: update trophy"
          git push